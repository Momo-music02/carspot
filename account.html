<head>

  <!-- Favicons & App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="favicon/favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CarSpot">
  <meta name="theme-color" content="#007aff">
  <meta name="msapplication-TileColor" content="#007aff">
  <meta name="msapplication-TileImage" content="favicon/android-chrome-192x192.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <main id="app-content">
    <h2>Mon Compte</h2>
    <div id="user-info" class="glass-form">
      <p id="user-email"></p>
      <input type="text" id="user-displayname" placeholder="Nom d'affichage">
      <button onclick="saveProfile()">Mettre à jour</button>
      <hr>
      <button id="logout-btn" style="background:red; color:white;">Déconnexion</button>
    </div>
  </main>

    <nav class="navbar">
    <ul>
      <li>
        <a href="liste.html">
          <span class="nav-ico"><i class="fa-solid fa-list"></i></span>
          <span class="nav-label">Listes</span>
        </a>
      </li>
      <li>
        <a href="voitures.html">
          <span class="nav-ico"><i class="fa-solid fa-car"></i></span>
          <span class="nav-label">Voitures</span>
        </a>
      </li>
      <li>
        <a href="create-car.html" class="createcar">
          <span class="nav-ico"><i class="fa-solid fa-plus"></i></span>
        </a>
      </li>
      <li>
        <a href="Setting.html">
          <span class="nav-ico"><i class="fa-solid fa-gear"></i></span>
          <span class="nav-label">Réglages</span>
        </a>
      </li>
      <li>
        <a href="account.html">
          <span class="nav-ico"><i class="fa-solid fa-user"></i></span>
          <span class="nav-label">Compte</span>
        </a>
      </li>
    </ul>
  </nav>


  <script>
    window.onload = () => {
      auth.onAuthStateChanged(user => {
        if(user) {
          document.getElementById('user-email').innerText = "Email : " + user.email;
          document.getElementById('user-displayname').value = user.displayName || "";
        }
      });
      document.getElementById('logout-btn').onclick = () => {
        auth.signOut();
      };
    };

    function saveProfile() {
      const name = document.getElementById('user-displayname').value;
      auth.currentUser.updateProfile({ displayName: name }).then(() => alert("Profil mis à jour !"));
    }
  </script>
</body>
</html>
