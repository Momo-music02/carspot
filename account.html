<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compte - CarSpot</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <main id="app-content">
    <h2>Mon Compte</h2>
    <div id="user-info" class="glass-form">
      <p id="user-email"></p>
      <input type="text" id="user-displayname" placeholder="Nom d'affichage">
      <button onclick="saveProfile()">Mettre à jour</button>
      <hr>
      <button id="logout-btn" style="background:red; color:white;">Déconnexion</button>
    </div>
  </main>

  <nav class="navbar">
    <ul>
      <li>
        <a href="liste.html" title="Listes">
          <span class="nav-ico"></span>
          <span class="nav-label">Listes</span>
          <span class="nav-emoji">📋</span>
        </a>
      </li>
      <li>
        <a href="voitures.html" title="Voitures">
          <span class="nav-ico"></span>
          <span class="nav-label">Voitures</span>
          <span class="nav-emoji">🚗</span>
        </a>
      </li>
      <li>
        <a href="create-car.html" class="createcar" title="Ajouter">
          <span class="nav-ico"></span>
          <span class="nav-emoji">➕</span>
        </a>
      </li>
      <li>
        <a href="Setting.html" title="Réglages">
          <span class="nav-ico"></span>
          <span class="nav-label">Réglages</span>
          <span class="nav-emoji">⚙️</span>
        </a>
      </li>
      <li>
        <a href="account.html" title="Compte">
          <span class="nav-ico"></span>
          <span class="nav-label">Compte</span>
          <span class="nav-emoji">👤</span>
        </a>
      </li>
    </ul>
  </nav>

  <script>
    window.onload = () => {
      auth.onAuthStateChanged(user => {
        if(user) {
          document.getElementById('user-email').innerText = "Email : " + user.email;
          document.getElementById('user-displayname').value = user.displayName || "";
        }
      });
      document.getElementById('logout-btn').onclick = () => {
        auth.signOut();
      };
    };

    function saveProfile() {
      const name = document.getElementById('user-displayname').value;
      auth.currentUser.updateProfile({ displayName: name }).then(() => alert("Profil mis à jour !"));
    }
  </script>
</body>
</html>
