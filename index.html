  <script>
    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBR_uHqxZhdIIHzhWyFNQaAQZ8uHyXf20c",
      authDomain: "carspot-d6ff9.firebaseapp.com",
      projectId: "carspot-d6ff9",
      storageBucket: "carspot-d6ff9.appspot.com",
      messagingSenderId: "1020332551922",
      appId: "1:1020332551922:web:7ab8a7bbd808f674d52a6b",
      measurementId: "G-YCVWCRSW91",
    };
    firebase.initializeApp(firebaseConfig);
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('id')) {
          showPage('car-detail');
        } else {
          showPage('cars');
        }
      

    // Système de navigation SPA (Single Page Application)
    async function showPage(page) {
      const container = document.getElementById('app-content');
      container.innerHTML = '<div class="loader">Chargement...</div>';
      
      // Mise à jour de l'UI des boutons
      document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('selected'));
      const activeBtn = document.getElementById('nav-' + page);
      if (activeBtn) activeBtn.classList.add('selected');

      switch(page) {
        case 'lists': renderListsPage(); break;
        case 'cars': renderCarsPage(); break;
        case 'add': renderAddCarPage(); break;
        case 'settings': renderSettingsPage(); break;
        case 'account': renderAccountPage(); break;
        case 'car-detail': renderCarDetailPage(); break;
      }
    }

    // --- FONCTIONS DE RENDU ---

    function renderListsPage() {
      const user = auth.currentUser;
      document.getElementById('app-content').innerHTML = `
        <h2>Mes listes</h2>
        <form id="add-list-form" class="glass-form">
          <input type="text" id="l-name" placeholder="Nom de la collection (ex: Supercars)" required>
          <input type="text" id="l-desc" placeholder="Description rapide" required>
          <button type="submit">Créer la liste</button>
        </form>
        <div id="lists-container"></div>
      `;

      db.collection('lists').where('uid', '==', user.uid).onSnapshot(snap => {
        const div = document.getElementById('lists-container');
        if(!div) return;
        div.innerHTML = '';
        snap.forEach(doc => {
          const data = doc.data();
          div.innerHTML += `
            <div class="list-item">
              <strong>${data.name}</strong>
              <p>${data.desc}</p>
            </div>`;
        });
      });

      document.getElementById('add-list-form').onsubmit = (e) => {
        e.preventDefault();
        db.collection('lists').add({
          uid: user.uid,
          name: document.getElementById('l-name').value,
          desc: document.getElementById('l-desc').value,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => e.target.reset());
      };
    }

    function renderCarsPage() {
      const user = auth.currentUser;
      document.getElementById('app-content').innerHTML = `<h2>Mes spots</h2><div id="cars-grid" class="grid"></div>`;
      
      db.collection('cars').where('uid', '==', user.uid).orderBy('createdAt', 'desc').onSnapshot(snap => {
        const grid = document.getElementById('cars-grid');
        if(!grid) return;
        grid.innerHTML = '';
        snap.forEach(doc => {
          const car = doc.data();
          grid.innerHTML += `
            <div class="car-card" onclick="window.location.href='?id=${doc.id}'">
              <div class="car-img" style="background-image: url('${car.photoURL}')"></div>
              <div class="car-info">
                <strong>${car.title}</strong>
                <span>${car.model}</span>
              </div>
            </div>`;
        });
      });
    }

    function renderAddCarPage() {
      const user = auth.currentUser;
      document.getElementById('app-content').innerHTML = `
        <h2>Nouveau Spot</h2>
        <form id="add-car-form" class="glass-form">
          <label class="file-label">
            <input type="file" id="c-file" accept="image/*" required>
            <span>📸 Choisir une photo</span>
          </label>
          <input type="text" id="c-title" placeholder="Nom du spot (ex: Ferrari à Paris)" required>
          <input type="text" id="c-model" placeholder="Modèle précis" required>
          <textarea id="c-desc" placeholder="Description..."></textarea>
          <select id="c-list" required><option value="">Chargement des listes...</option></select>
          <button type="submit" id="btn-up">Enregistrer le spot</button>
        </form>
      `;

      // Charger les listes dans le select
      db.collection('lists').where('uid', '==', user.uid).get().then(snap => {
        const sel = document.getElementById('c-list');
        sel.innerHTML = '<option value="">Choisir une liste</option>';
        snap.forEach(doc => sel.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
      });

      document.getElementById('add-car-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-up');
        const file = document.getElementById('c-file').files[0];
        btn.disabled = true; btn.innerText = "Téléchargement...";

        const ref = storage.ref(`spots/${user.uid}/${Date.now()}_${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();

        await db.collection('cars').add({
          uid: user.uid,
          title: document.getElementById('c-title').value,
          model: document.getElementById('c-model').value,
          desc: document.getElementById('c-desc').value,
          listId: document.getElementById('c-list').value,
          photoURL: url,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showPage('cars');
      };
    }

    function renderSettingsPage() {
      document.getElementById('app-content').innerHTML = `
        <h2>Réglages</h2>
        <div class="glass-form">
          <label>Couleur de fond :</label>
          <input type="color" onchange="updateBg(this.value)">
          <br><br>
          <label>Image de fond (URL) :</label>
          <input type="text" id="bg-url" placeholder="https://...">
          <button onclick="updateBg(document.getElementById('bg-url').value)">Appliquer l'image</button>
          <br>
          <button onclick="localStorage.removeItem('cs-bg'); location.reload();" style="background:#888">Réinitialiser</button>
        </div>
      `;
    }

    window.updateBg = (val) => {
      localStorage.setItem('cs-bg', val);
      location.reload();
    };

    function renderAccountPage() {
      const user = auth.currentUser;
      document.getElementById('app-content').innerHTML = `
        <h2>Mon Compte</h2>
        <div class="glass-form">
          <p><strong>Email :</strong> ${user.email}</p>
          <input type="text" id="u-name" value="${user.displayName || ''}" placeholder="Nom d'utilisateur">
          <button onclick="updateProfile()">Mettre à jour le nom</button>
          <hr>
          <button onclick="auth.signOut()" style="background:var(--error-color)">Déconnexion</button>
        </div>
      `;
    }

    window.updateProfile = () => {
      const name = document.getElementById('u-name').value;
      auth.currentUser.updateProfile({ displayName: name }).then(() => alert("Profil mis à jour !"));
    };

    function renderCarDetailPage() {
      const id = new URLSearchParams(window.location.search).get('id');
      db.collection('cars').doc(id).get().then(doc => {
        if(!doc.exists) return showPage('cars');
        const car = doc.data();
        document.getElementById('app-content').innerHTML = `
          <button onclick="history.back()" style="width:auto; margin-bottom:15px;">← Retour</button>
          <img src="${car.photoURL}" class="detail-img">
          <h2>${car.title}</h2>
          <p><strong>Modèle:</strong> ${car.model}</p>
          <p>${car.desc}</p>
          <button onclick="deleteCar('${id}')" style="background:red">Supprimer ce spot</button>
        `;
      });
    }

    window.deleteCar = (id) => {
      if(confirm("Supprimer ce spot définitivement ?")) {
        db.collection('cars').doc(id).delete().then(() => window.location.href = 'index.html');
      }
    };

    // Listeners Navbar

  </script>
