<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarSpot - Connexion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="firebase-config.js"></script>
  <!-- Plus de redirection automatique, page accessible à tous -->
</head>
<body>
  <div class="container">
    <img class="apple-logo" src="data:image/svg+xml;utf8,<svg width='100' height='100' viewBox='0 0 24 24' fill='black' xmlns='http://www.w3.org/2000/svg'><path d='M16.365 1.43c0 1.14-.93 2.07-2.07 2.07-.06 0-.12 0-.18-.01.01-.13.02-.26.02-.39 0-1.14.93-2.07 2.07-2.07.06 0 .12 0 .18.01-.01.13-.02.26-.02.39zm2.09 4.37c-1.14-.13-2.34.66-2.95.66-.62 0-1.56-.64-2.57-.62-1.32.02-2.54.77-3.22 1.96-1.38 2.39-.35 5.93.98 7.87.65.95 1.42 2.01 2.43 1.97.97-.04 1.34-.63 2.51-.63 1.17 0 1.5.63 2.52.61 1.04-.02 1.69-.97 2.33-1.92.41-.6.58-.92.91-1.61-2.39-.91-2.76-4.31.47-5.01-.12-.36-.34-.7-.64-.92-.29-.22-.7-.41-1.08-.41zm-2.02 12.13c-.62 0-1.24.18-1.98.18-.74 0-1.39-.17-2.01-.18-1.41-.03-2.7-.81-3.42-2.06-.98-1.7-.7-4.18.7-5.53.48-.46 1.13-.75 1.8-.75.53 0 1.09.18 1.7.18.61 0 1.13-.18 1.7-.18.67 0 1.32.29 1.8.75 1.4 1.35 1.68 3.83.7 5.53-.72 1.25-2.01 2.03-3.41 2.06z'/></svg>" alt="Apple Logo" />
    <h1>Bienvenue sur CarSpot</h1>
    <p style="color:#555;margin-bottom:28px;">L'application de spotting automobile moderne et sécurisée.<br>Connecte-toi ou crée un compte pour accéder à toutes les fonctionnalités.</p>
    <div id="user-box" style="display:none;">
      <div style="margin-bottom:18px;">
        <strong id="user-nom"></strong><br>
        <span id="user-email" style="color:#888;font-size:0.98em;"></span>
      </div>
      <button onclick="window.location.href='account.html'">Mon compte</button>
      <button onclick="logout()">Se déconnecter</button>
    </div>
    <div id="guest-box" style="display:none;">
      <button onclick="window.location.href='login.html'">Se connecter</button>
      <button onclick="window.location.href='login.html'">Créer un compte</button>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    function showUser(user) {
      document.getElementById('user-box').style.display = 'block';
      document.getElementById('guest-box').style.display = 'none';
      // Affichage nom/prénom/email
      if(user.displayName) {
        document.getElementById('user-nom').innerText = user.displayName;
      } else {
        document.getElementById('user-nom').innerText = '';
      }
      document.getElementById('user-email').innerText = user.email;
    }
    function showGuest() {
      document.getElementById('user-box').style.display = 'none';
      document.getElementById('guest-box').style.display = 'block';
    }
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        showUser(user);
      } else {
        showGuest();
      }
    });
    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
