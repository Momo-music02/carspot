<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - CarSpot</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="logo">CarSpot</h1>
    <p id="auth-title">Heureux de vous revoir</p>

    <form id="auth-form" class="authform">
      <div id="register-fields" style="display:none;">
        <input type="text" id="register-nom" placeholder="Nom" autocomplete="family-name">
        <input type="text" id="register-prenom" placeholder="Prénom" autocomplete="given-name">
      </div>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Mot de passe" required>
      <button type="submit" id="auth-btn">Se connecter</button>
    </form>

    <p class="auth-switch">
      <span id="switch-text">Pas encore de compte ?</span> 
      <a href="#" id="toggle-auth">S'inscrire</a>
    </p>
    <div id="error-msg" style="color: red; margin-top: 10px; font-size: 0.9em;"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBR_uHqxZhdIIHzhWyFNQaAQZ8uHyXf20c",
      authDomain: "carspot-d6ff9.firebaseapp.com",
      projectId: "carspot-d6ff9",
      storageBucket: "carspot-d6ff9.appspot.com",
      messagingSenderId: "1020332551922",
      appId: "1:1020332551922:web:7ab8a7bbd808f674d52a6b"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const form = document.getElementById('auth-form');
    const toggleBtn = document.getElementById('toggle-auth');
    let isLogin = true;

    // Basculer entre Connexion et Inscription
    toggleBtn.onclick = (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      document.getElementById('auth-title').innerText = isLogin ? "Heureux de vous revoir" : "Créer un compte";
      document.getElementById('auth-btn').innerText = isLogin ? "Se connecter" : "S'inscrire";
      document.getElementById('switch-text').innerText = isLogin ? "Pas encore de compte ?" : "Déjà un compte ?";
      toggleBtn.innerText = isLogin ? "S'inscrire" : "Se connecter";
      document.getElementById('register-fields').style.display = isLogin ? 'none' : 'block';
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      if (isLogin) {
        auth.signInWithEmailAndPassword(email, pass)
          .then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'index.html';
            window.location.href = decodeURIComponent(redirect);
          })
          .catch(err => {
            errorDiv.innerText = err.message;
          });
      } else {
        const nom = document.getElementById('register-nom').value;
        const prenom = document.getElementById('register-prenom').value;
        if (!nom || !prenom) {
          errorDiv.innerText = "Veuillez renseigner le nom et le prénom.";
          return;
        }
        auth.createUserWithEmailAndPassword(email, pass)
          .then(async (userCredential) => {
            await userCredential.user.updateProfile({ displayName: nom + ' ' + prenom });
            // Création du document utilisateur dans Firestore
            const db = firebase.firestore();
            await db.collection('users').doc(userCredential.user.uid).set({
              nom,
              prenom,
              email,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'index.html';
            window.location.href = decodeURIComponent(redirect);
          })
          .catch(err => {
            errorDiv.innerText = err.message;
          });
      }
    };
  </script>

</body>
</html>
