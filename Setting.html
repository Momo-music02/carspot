<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réglages - CarSpot</title>
  <!-- Favicons & App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="favicon/favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CarSpot">
  <meta name="theme-color" content="#007aff">
  <meta name="msapplication-TileColor" content="#007aff">
  <meta name="msapplication-TileImage" content="favicon/android-chrome-192x192.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <main id="app-content">
    <h2>Réglages</h2>
    <div class="glass-form">
      <label>Couleur ou dégradé de fond :</label><br>
      <input type="color" id="color1" value="#007aff"> à
      <input type="color" id="color2" value=""><br>
      <small>(Laisse la 2e couleur vide pour une seule couleur)</small><br><br>
      <button onclick="applyGradient()">Appliquer</button>
      <button onclick="resetBg()">Défaut</button>
      <hr>
      <label>Image de fond (URL) :</label>
      <input type="text" id="bg-url" placeholder="https://...">
      <button onclick="updateBg(document.getElementById('bg-url').value)">Appliquer l'image</button>
    </div>
  </main>

  <nav class="navbar">
    <ul>
      <li>
        <a href="liste.html" title="Listes">
          <span class="nav-ico"></span>
          <span class="nav-label">Listes</span>
          <span class="nav-emoji">📋</span>
        </a>
      </li>
      <li>
        <a href="voitures.html" title="Voitures">
          <span class="nav-ico"></span>
          <span class="nav-label">Voitures</span>
          <span class="nav-emoji">🚗</span>
        </a>
      </li>
      <li>
        <a href="create-car.html" class="createcar" title="Ajouter">
          <span class="nav-ico"></span>
          <span class="nav-emoji">➕</span>
        </a>
      </li>
      <li>
        <a href="Setting.html" title="Réglages">
          <span class="nav-ico"></span>
          <span class="nav-label">Réglages</span>
          <span class="nav-emoji">⚙️</span>
        </a>
      </li>
      <li>
        <a href="account.html" title="Compte">
          <span class="nav-ico"></span>
          <span class="nav-label">Compte</span>
          <span class="nav-emoji">👤</span>
        </a>
      </li>
    </ul>
  </nav>

  <script>
    // Appliquer le dégradé sur la page Setting
    function setGradientBg(c1, c2) {
      if (c2 && c2 !== '') {
        document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
      } else {
        document.body.style.background = c1;
      }
    }
    // Appliquer le fond depuis le localStorage
    function applyStoredBg() {
      const grad = localStorage.getItem('cs-gradient');
      const img = localStorage.getItem('cs-bg');
      if (grad) {
        const [c1, c2] = grad.split(',');
        setGradientBg(c1, c2);
        document.getElementById('color1').value = c1;
        document.getElementById('color2').value = c2 || '';
      } else if (img) {
        if (img.startsWith('#')) document.body.style.backgroundColor = img;
        else document.body.style.backgroundImage = `url(${img})`;
      }
    }
    function applyGradient() {
      const c1 = document.getElementById('color1').value;
      const c2 = document.getElementById('color2').value;
      localStorage.setItem('cs-gradient', `${c1},${c2}`);
      localStorage.removeItem('cs-bg');
      setGradientBg(c1, c2);
    }
    function updateBg(val) {
      localStorage.setItem('cs-bg', val);
      localStorage.removeItem('cs-gradient');
      location.reload();
    }
    function resetBg() {
      localStorage.removeItem('cs-bg');
      localStorage.removeItem('cs-gradient');
      location.reload();
    }
    applyStoredBg();
  </script>
</body>
</html>
