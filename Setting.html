  <script>
    // Appliquer le dégradé sur la page Setting
    let gradientAnimationInterval = null;
    function setGradientBg(c1, c2, animate=false) {
      if (gradientAnimationInterval) {
        clearInterval(gradientAnimationInterval);
        gradientAnimationInterval = null;
      }
      if (animate && c2 && c2 !== '') {
        let angle = 0;
        gradientAnimationInterval = setInterval(() => {
          angle = (angle + 1) % 360;
          document.body.style.background = `linear-gradient(${angle}deg, ${c1}, ${c2})`;
        }, 50);
      } else if (c2 && c2 !== '') {
        document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
      } else {
        document.body.style.background = c1;
      }
    }
    // Appliquer le fond depuis le localStorage
    function applyStoredBg() {
      const grad = localStorage.getItem('cs-gradient');
      const img = localStorage.getItem('cs-bg');
      const animate = localStorage.getItem('cs-animate-gradient') === 'true';
      if (grad) {
        const [c1, c2] = grad.split(',');
        setGradientBg(c1, c2, animate);
        document.getElementById('color1').value = c1;
        document.getElementById('color2').value = c2 || '';
        document.getElementById('animate-gradient').checked = animate;
      } else if (img) {
        if (img.startsWith('#')) document.body.style.backgroundColor = img;
        else document.body.style.backgroundImage = `url(${img})`;
      }
      // Appliquer couleurs texte/bouton/titres
      const textColor = localStorage.getItem('cs-text-color');
      const titleColor = localStorage.getItem('cs-title-color');
      const btnColor = localStorage.getItem('cs-btn-color');
      const btnTextColor = localStorage.getItem('cs-btn-text-color');
      if (textColor) document.body.style.color = textColor;
      if (titleColor) {
        document.querySelectorAll('h1,h2,h3').forEach(t => t.style.color = titleColor);
        document.getElementById('title-color').value = titleColor;
      }
      if (btnColor) {
        document.querySelectorAll('button').forEach(b => b.style.background = btnColor);
        document.getElementById('btn-color').value = btnColor;
      }
      if (btnTextColor) {
        document.querySelectorAll('button').forEach(b => b.style.color = btnTextColor);
        document.getElementById('btn-text-color').value = btnTextColor;
      }
      if (textColor) document.getElementById('text-color').value = textColor;
    }
    function applyGradient() {
      const c1 = document.getElementById('color1').value;
      const c2 = document.getElementById('color2').value;
      const animate = document.getElementById('animate-gradient').checked;
      if (window.auth && window.auth.currentUser && window.db) {
        const userRef = window.db.collection('users').doc(window.auth.currentUser.uid);
        userRef.set({ gradient: `${c1},${c2}`, animateGradient: !!animate }, { merge: true });
      }
      localStorage.setItem('cs-gradient', `${c1},${c2}`);
      localStorage.setItem('cs-animate-gradient', animate);
      localStorage.removeItem('cs-bg');
      setGradientBg(c1, c2, animate);
    }
        function applyColors() {
          const textColor = document.getElementById('text-color').value;
          const titleColor = document.getElementById('title-color').value;
          const btnColor = document.getElementById('btn-color').value;
          const btnTextColor = document.getElementById('btn-text-color').value;
          localStorage.setItem('cs-text-color', textColor);
          localStorage.setItem('cs-title-color', titleColor);
          localStorage.setItem('cs-btn-color', btnColor);
          localStorage.setItem('cs-btn-text-color', btnTextColor);
          document.body.style.color = textColor;
          document.querySelectorAll('h1,h2,h3').forEach(t => t.style.color = titleColor);
          document.querySelectorAll('button').forEach(b => {
            b.style.background = btnColor;
            b.style.color = btnTextColor;
          });
        }
    function updateBg(val) {
      localStorage.setItem('cs-bg', val);
      localStorage.removeItem('cs-gradient');
      location.reload();
    }
    function resetBg() {
      localStorage.removeItem('cs-bg');
      localStorage.removeItem('cs-gradient');
      location.reload();
    }
    function uploadBgImage() {
      const fileInput = document.getElementById('bg-file');
      const file = fileInput.files[0];
      if (!file) return alert('Sélectionne une image.');
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        localStorage.setItem('cs-bg', dataUrl);
        localStorage.removeItem('cs-gradient');
        location.reload();
      };
      reader.readAsDataURL(file);
    }
    applyStoredBg();

    function removeBgImage() {
            localStorage.removeItem('cs-bg');
            location.reload();
          }
  </script>
</body>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const picker = document.getElementById('theme-color-picker');
  const applyBtn = document.getElementById('apply-theme-color');
  const resetBtn = document.getElementById('reset-theme-color');
  if (!picker || !applyBtn || !resetBtn) return;
  // Applique la couleur stockée dès le chargement de la page Setting
  if (window.applyStoredThemeColor) window.applyStoredThemeColor();
  let stored = localStorage.getItem('cs-theme-color');
  if (!stored && window.auth && window.auth.currentUser) {
    window.db.collection('users').doc(window.auth.currentUser.uid).get().then(doc => {
      if (doc.exists && doc.data().themeColor) {
        stored = doc.data().themeColor;
        picker.value = stored;
      }
    });
  } else if (stored) {
    picker.value = stored;
  }
  applyBtn.addEventListener('click', async function() {
    const color = picker.value;
    localStorage.setItem('cs-theme-color', color);
    if (window.auth && window.auth.currentUser) {
      await window.db.collection('users').doc(window.auth.currentUser.uid).set({ themeColor: color }, { merge: true });
    }
    if (window.applyThemeColor) window.applyThemeColor(color);
  });
  resetBtn.addEventListener('click', async function() {
    localStorage.removeItem('cs-theme-color');
    if (window.auth && window.auth.currentUser) {
      await window.db.collection('users').doc(window.auth.currentUser.uid).update({ themeColor: window.firebase.firestore.FieldValue.delete() });
    }
    if (window.applyThemeColor) window.applyThemeColor('#007aff');
    picker.value = '#007aff';
  });
});
</script>
