<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Voitures - CarSpot</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <main id="app-content">
    <h2>Mes spots</h2>
    <div id="cars-grid" class="grid"></div>
  </main>

  <nav class="navbar">
    <ul>
      <li><a href="liste.html">Listes</a></li>
      <li><a href="voitures.html">Voitures</a></li>
      <li><a href="create-car.html" class="createcar">+</a></li>
      <li><a href="Setting.html">Réglages</a></li>
      <li><a href="account.html">Compte</a></li>
    </ul>
  </nav>

  <script>
    window.onload = () => {
      auth.onAuthStateChanged(user => {
        if(user) {
          db.collection('cars').where('uid', '==', user.uid).orderBy('createdAt', 'desc').onSnapshot(snap => {
            const grid = document.getElementById('cars-grid');
            grid.innerHTML = '';
            snap.forEach(doc => {
              const car = doc.data();
              grid.innerHTML += `
                <div class="car-card" onclick="window.location.href='car-detail.html?id=${doc.id}'">
                  <div class="car-img" style="background-image: url('${car.photoURL}')"></div>
                  <div class="car-info"><strong>${car.title}</strong><span>${car.model}</span></div>
                </div>`;
            });
          });
        }
      });
    };
  </script>
</body>
</html>
