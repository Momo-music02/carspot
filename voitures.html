<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Voitures - CarSpot</title>
  <!-- Favicons & App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="favicon/favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CarSpot">
  <meta name="theme-color" content="#007aff">
  <meta name="msapplication-TileColor" content="#007aff">
  <meta name="msapplication-TileImage" content="favicon/android-chrome-192x192.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="navbar.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="main.js"></script>
  <script src="cars.js"></script>
</head>
<body>
  <main id="app-content">
    <h2>Mes voitures</h2>
    <div style="margin-bottom:10px;">
      <input id="search-car" type="text" placeholder="Rechercher un modèle..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;">
    </div>
    <div style="margin-bottom:16px;">
      <select id="sort-car" style="width:100%;padding:10px;border-radius:8px;">
        <option value="date-desc">Plus récentes</option>
        <option value="date-asc">Plus anciennes</option>
        <option value="alpha-asc">A → Z</option>
        <option value="alpha-desc">Z → A</option>
      </select>
    </div>
    <div id="cars-grid" class="grid"></div>
  </main>

  <nav class="navbar">
    <ul>
      <li>
        <a href="liste.html" title="Listes">
          <span class="nav-ico"></span>
          <span class="nav-label">Listes</span>
          <span class="nav-emoji">📋</span>
        </a>
      </li>
      <li>
        <a href="voitures.html" title="Voitures">
          <span class="nav-ico"></span>
          <span class="nav-label">Voitures</span>
          <span class="nav-emoji">🚗</span>
        </a>
      </li>
      <li>
        <a href="create-car.html" class="createcar" title="Ajouter">
          <span class="nav-ico"></span>
          <span class="nav-emoji">➕</span>
        </a>
      </li>
      <li>
        <a href="Setting.html" title="Réglages">
          <span class="nav-ico"></span>
          <span class="nav-label">Réglages</span>
          <span class="nav-emoji">⚙️</span>
        </a>
      </li>
      <li>
        <a href="account.html" title="Compte">
          <span class="nav-ico"></span>
          <span class="nav-label">Compte</span>
          <span class="nav-emoji">👤</span>
        </a>
      </li>
    </ul>
  </nav>
  <script src="main.js"></script>
</body>
</html>
